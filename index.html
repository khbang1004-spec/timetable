<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2학년 4반 선택과목 시간표 조회</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN (React JSX 문법 해석용) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 테이블 셀 안의 텍스트가 넘칠 경우 자동 줄바꿈 처리 */
        .subject-text {
            word-break: break-all;
            line-height: 1.2;
            display: block;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 학생 데이터 (전체 32명)
        const studentsData = [
          { id: 1, name: "고해민", a: { sub: "중국어A", room: "2-2" }, b: { sub: "도시의미래탐구B", room: "2-9" }, c: { sub: "세계시민과지리C", room: "2-7" }, d: { sub: "미술과매체D", room: "2-5" } },
          { id: 2, name: "공혜영", a: { sub: "법과사회A", room: "2-9" }, b: { sub: "경제B", room: "2-6" }, c: { sub: "한문C", room: "2-1" }, d: { sub: "세계시민과지리D", room: "2-6" } },
          { id: 3, name: "김나현", a: { sub: "세계시민과지리A", room: "2-8" }, b: { sub: "윤리와사상B1", room: "2-5" }, c: { sub: "사회문제탐구C", room: "2-8" }, d: { sub: "한문D", room: "2-2" } },
          { id: 4, name: "김서진", a: { sub: "한문A", room: "2-3" }, b: { sub: "윤리와사상B1", room: "2-5" }, c: { sub: "법과사회C", room: "2-5" }, d: { sub: "미술과매체D", room: "2-5" } },
          { id: 5, name: "김소윤", a: { sub: "일본어A", room: "2-1" }, b: { sub: "프로그래밍B", room: "별도교실" }, c: { sub: "물리학C", room: "2-12" }, d: { sub: "미술과매체D", room: "2-5" } },
          { id: 6, name: "김예원", a: { sub: "화학A", room: "2-11" }, b: { sub: "한문B", room: "2-4" }, c: { sub: "생명과학C", room: "2-11" }, d: { sub: "물리학D", room: "2-12" } },
          { id: 7, name: "김은서", a: { sub: "생명과학A", room: "2-12" }, b: { sub: "윤리와사상B1", room: "2-5" }, c: { sub: "한문C", room: "2-1" }, d: { sub: "화학D", room: "2-10" } },
          { id: 8, name: "김하은", a: { sub: "기하A", room: "2-5" }, b: { sub: "화학B", room: "2-12" }, c: { sub: "한문C", room: "2-1" }, d: { sub: "생명과학D1", room: "2-11" } },
          { id: 9, name: "문예원", a: { sub: "세계시민과지리A", room: "2-8" }, b: { sub: "일본어B", room: "2-2" }, c: { sub: "생활과학탐구C", room: "별도교실" }, d: { sub: "경제D", room: "2-8" } },
          { id: 10, name: "박세현", a: { sub: "한문A", room: "2-3" }, b: { sub: "윤리와사상B1", room: "2-5" }, c: { sub: "화학C", room: "2-9" }, d: { sub: "생명과학D1", room: "2-11" } },
          { id: 11, name: "박승원", a: { sub: "사회문제탐구A", room: "2-7" }, b: { sub: "생명과학B", room: "2-10" }, c: { sub: "일본어C", room: "2-3" }, d: { sub: "물리학D", room: "2-12" } },
          { id: 12, name: "배성은", a: { sub: "세계시민과지리A", room: "2-8" }, b: { sub: "일본어B", room: "2-2" }, c: { sub: "법과사회C", room: "2-5" }, d: { sub: "윤리와사상D", room: "2-7" } },
          { id: 13, name: "안희윤", a: { sub: "윤리와사상A", room: "2-6" }, b: { sub: "한문B", room: "2-4" }, c: { sub: "사회문제탐구C", room: "2-8" }, d: { sub: "세계시민과지리D", room: "2-6" } },
          { id: 14, name: "오호진", a: { sub: "물리학A", room: "2-10" }, b: { sub: "일본어B", room: "2-2" }, c: { sub: "화학C", room: "2-9" }, d: { sub: "생명과학D1", room: "2-11" } },
          { id: 15, name: "윤재선", a: { sub: "물리학A", room: "2-10" }, b: { sub: "프로그래밍B", room: "별도교실" }, c: { sub: "기하C", room: "2-2" }, d: { sub: "일본어D", room: "2-4" } },
          { id: 16, name: "이건호", a: { sub: "한문A", room: "2-3" }, b: { sub: "화학B", room: "2-12" }, c: { sub: "물리학C", room: "2-12" }, d: { sub: "생명과학D1", room: "2-11" } },
          { id: 17, name: "이나예", a: { sub: "일본어A", room: "2-1" }, b: { sub: "화학B", room: "2-12" }, c: { sub: "생명과학C", room: "2-11" }, d: { sub: "생활과학탐구D", room: "별도교실" } },
          { id: 18, name: "이민주", a: { sub: "음악과미디어A", room: "음악실" }, b: { sub: "사회문제탐구B", room: "2-8" }, c: { sub: "일본어C", room: "2-3" }, d: { sub: "윤리와사상D", room: "2-7" } },
          { id: 19, name: "이재율", a: { sub: "생명과학A", room: "2-12" }, b: { sub: "한문B", room: "2-4" }, c: { sub: "물리학C", room: "2-12" }, d: { sub: "화학D", room: "2-10" } },
          { id: 20, name: "이지현", a: { sub: "중국어A", room: "2-2" }, b: { sub: "윤리와사상B1", room: "2-5" }, c: { sub: "사회문제탐구C", room: "2-8" }, d: { sub: "미술과매체D", room: "2-5" } },
          { id: 21, name: "전태민", a: { sub: "사회문제탐구A", room: "2-7" }, b: { sub: "화학B", room: "2-12" }, c: { sub: "생명과학C", room: "2-11" }, d: { sub: "한문D", room: "2-2" } },
          { id: 22, name: "조성호", a: { sub: "중국어A", room: "2-2" }, b: { sub: "생명과학B", room: "2-10" }, c: { sub: "화학C", room: "2-9" }, d: { sub: "물리학D", room: "2-12" } },
          { id: 23, name: "조윤건", a: { sub: "한문A", room: "2-3" }, b: { sub: "경제B", room: "2-6" }, c: { sub: "세계시민과지리C", room: "2-7" }, d: { sub: "윤리와사상D", room: "2-7" } },
          { id: 24, name: "차건우", a: { sub: "일본어A", room: "2-1" }, b: { sub: "경제B", room: "2-6" }, c: { sub: "세계시민과지리C", room: "2-7" }, d: { sub: "윤리와사상D", room: "2-7" } },
          { id: 25, name: "최수빈", a: { sub: "일본어A", room: "2-1" }, b: { sub: "화학B", room: "2-12" }, c: { sub: "윤리와사상C", room: "2-6" }, d: { sub: "생명과학D1", room: "2-11" } },
          { id: 26, name: "최예준", a: { sub: "동아시아역사기행A", room: "2-4" }, b: { sub: "물리학B", room: "2-11" }, c: { sub: "지구과학C", room: "2-10" }, d: { sub: "중국어D", room: "2-1" } },
          { id: 27, name: "최재영", a: { sub: "중국어A", room: "2-2" }, b: { sub: "도시의미래탐구B", room: "2-9" }, c: { sub: "사회문제탐구C", room: "2-8" }, d: { sub: "윤리와사상D", room: "2-7" } },
          { id: 28, name: "현석윤", a: { sub: "생명과학A", room: "2-12" }, b: { sub: "인공지능기초B", room: "2-1" }, c: { sub: "중국어C", room: "2-4" }, d: { sub: "생활과학탐구D", room: "별도교실" } },
          { id: 29, name: "홍남경", a: { sub: "물리학A", room: "2-10" }, b: { sub: "화학B", room: "2-12" }, c: { sub: "생명과학C", room: "2-11" }, d: { sub: "일본어D", room: "2-4" } },
          { id: 30, name: "홍유빈", a: { sub: "사회문제탐구A", room: "2-7" }, b: { sub: "윤리와사상B1", room: "2-5" }, c: { sub: "법과사회C", room: "2-5" }, d: { sub: "일본어D", room: "2-4" } },
          { id: 31, name: "황선균", a: { sub: "음악과미디어A", room: "음악실" }, b: { sub: "윤리와사상B1", room: "2-5" }, c: { sub: "사회문제탐구C", room: "2-8" }, d: { sub: "중국어D", room: "2-1" } },
          { id: 32, name: "황정우", a: { sub: "중국어A", room: "2-2" }, b: { sub: "생명과학B", room: "2-10" }, c: { sub: "물리학C", room: "2-12" }, d: { sub: "화학D", room: "2-10" } }
        ];

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);

            const filteredStudents = studentsData.filter(student =>
                student.name.includes(searchTerm) || student.id.toString() === searchTerm
            );

            const handleSelect = (student) => {
                setSelectedStudent(student);
                setSearchTerm('');
            };

            const generateFullSchedule = (student) => {
                const defaultRoom = "본반";
                return [
                    [ // 월
                        { sub: "대수", r: defaultRoom, t: "c" }, { sub: "영어1", r: defaultRoom, t: "c" }, { sub: "영어1", r: defaultRoom, t: "c" }, { sub: "문학", r: defaultRoom, t: "c" },
                        { sub: student.b.sub, r: student.b.room, t: "e", b: "B" }, { sub: student.b.sub, r: student.b.room, t: "e", b: "B" }, { sub: "문학", r: defaultRoom, t: "c" }
                    ],
                    [ // 화
                        { sub: "대수", r: defaultRoom, t: "c" }, { sub: "영어1", r: defaultRoom, t: "c" }, { sub: student.b.sub, r: student.b.room, t: "e", b: "B" }, { sub: student.b.sub, r: student.b.room, t: "e", b: "B" },
                        { sub: student.a.sub, r: student.a.room, t: "e", b: "A" }, { sub: student.a.sub, r: student.a.room, t: "e", b: "A" }, { sub: "-", r: "", t: "x" }
                    ],
                    [ // 수
                        { sub: "과탐실", r: "과학실", t: "c" }, { sub: student.c.sub, r: student.c.room, t: "e", b: "C" }, { sub: student.c.sub, r: student.c.room, t: "e", b: "C" }, { sub: student.d.sub, r: student.d.room, t: "e", b: "D" },
                        { sub: student.d.sub, r: student.d.room, t: "e", b: "D" }, { sub: "창체", r: defaultRoom, t: "c" }, { sub: "창체", r: defaultRoom, t: "c" }
                    ],
                    [ // 목
                        { sub: "스생1", r: "체육관", t: "c" }, { sub: "대수", r: defaultRoom, t: "c" }, { sub: "문학", r: defaultRoom, t: "c" }, { sub: "영어1", r: defaultRoom, t: "c" },
                        { sub: student.c.sub, r: student.c.room, t: "e", b: "C" }, { sub: student.c.sub, r: student.c.room, t: "e", b: "C" }, { sub: "-", r: "", t: "x" }
                    ],
                    [ // 금
                        { sub: "스생1", r: "체육관", t: "c" }, { sub: student.d.sub, r: student.d.room, t: "e", b: "D" }, { sub: student.d.sub, r: student.d.room, t: "e", b: "D" }, { sub: student.a.sub, r: student.a.room, t: "e", b: "A" },
                        { sub: student.a.sub, r: student.a.room, t: "e", b: "A" }, { sub: "문학", r: defaultRoom, t: "c" }, { sub: "대수", r: defaultRoom, t: "c" }
                    ]
                ];
            };

            return (
                <div className="min-h-screen p-2 sm:p-8 max-w-4xl mx-auto bg-slate-50">
                    <header className="text-center mb-6 sm:mb-10 pt-4">
                        <div className="bg-indigo-600 text-white w-12 h-12 sm:w-16 sm:h-16 rounded-2xl sm:rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                            <svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <h1 className="text-2xl sm:text-3xl font-extrabold text-slate-900 leading-tight">2-4 선택과목 시간표</h1>
                        <p className="text-slate-500 mt-2 text-sm sm:text-base">이름이나 번호로 검색하세요</p>
                    </header>

                    <div className="relative mb-8 max-w-md mx-auto px-2">
                        <input
                            type="text"
                            className="w-full px-5 py-3 sm:px-6 sm:py-4 rounded-xl sm:rounded-2xl border-2 border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-sm text-base sm:text-lg"
                            placeholder="예: 15 또는 윤재선"
                            value={searchTerm}
                            onChange={(e) => {
                                setSearchTerm(e.target.value);
                                if(selectedStudent) setSelectedStudent(null);
                            }}
                        />
                        {searchTerm && !selectedStudent && (
                            <div className="absolute top-full left-2 right-2 bg-white mt-2 rounded-xl sm:rounded-2xl shadow-2xl border border-slate-100 z-50 max-h-60 overflow-y-auto">
                                {filteredStudents.length > 0 ? (
                                    filteredStudents.map(s => (
                                        <div key={s.id} onClick={() => handleSelect(s)} className="p-3 sm:p-4 hover:bg-indigo-50 cursor-pointer flex items-center border-b last:border-0 border-slate-50">
                                            <span className="bg-slate-100 text-slate-600 font-bold px-2 py-0.5 sm:px-3 sm:py-1 rounded-lg mr-3 sm:mr-4 text-sm sm:text-base">{s.id}</span>
                                            <span className="text-base sm:text-lg font-semibold">{s.name}</span>
                                        </div>
                                    ))
                                ) : <div className="p-6 text-center text-slate-400 text-sm">학생 정보가 없습니다.</div>}
                            </div>
                        )}
                    </div>

                    {selectedStudent && (
                        <div className="bg-white rounded-2xl sm:rounded-3xl shadow-2xl overflow-hidden animate-fade-in border border-slate-100 mx-1">
                            <div className="bg-gradient-to-r from-indigo-600 to-blue-600 p-4 sm:p-6 text-white flex justify-between items-center">
                                <div>
                                    <span className="text-indigo-100 text-[10px] sm:text-xs font-bold uppercase tracking-widest opacity-80">TIME TABLE</span>
                                    <h2 className="text-lg sm:text-2xl font-black">{selectedStudent.id}번 {selectedStudent.name}</h2>
                                </div>
                                <div className="bg-white/20 px-3 py-1 sm:px-4 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold uppercase tracking-tight">2학년 4반</div>
                            </div>

                            <div className="p-1 sm:p-6 bg-white overflow-hidden">
                                <table className="w-full border-separate border-spacing-1 sm:border-spacing-2 text-center table-fixed">
                                    <thead>
                                        <tr className="text-slate-400 text-[11px] sm:text-base">
                                            <th className="w-[10%] p-1 sm:p-2">교시</th>
                                            {["월", "화", "수", "목", "금"].map(d => <th key={d} className="w-[18%] p-1 sm:p-2 font-bold text-slate-600">{d}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {[0,1,2,3,4,5,6].map(p => (
                                            <tr key={p}>
                                                <td className="font-bold text-slate-300 text-[11px] sm:text-sm">{p+1}</td>
                                                {generateFullSchedule(selectedStudent).map((day, idx) => {
                                                    const lesson = day[p];
                                                    if (lesson.t === "x") return <td key={idx} className="bg-slate-50/50 rounded-lg sm:rounded-2xl h-24 sm:h-28"></td>;
                                                    
                                                    return (
                                                        <td key={idx} className={`p-0.5 sm:p-1.5 rounded-lg sm:rounded-2xl transition-all h-24 sm:h-28 ${lesson.t === "e" ? 'bg-indigo-50 border border-indigo-100 shadow-sm' : 'bg-white border border-slate-100'}`}>
                                                            <div className="flex flex-col items-center justify-center h-full space-y-1 sm:space-y-1.5 overflow-hidden px-0.5">
                                                                {lesson.b && <span className="text-[7px] sm:text-[9px] font-black text-indigo-400 leading-none">{lesson.b}</span>}
                                                                <span className={`text-[11px] sm:text-[15px] font-bold leading-tight subject-text ${lesson.t === "e" ? 'text-indigo-800' : 'text-slate-700'}`}>
                                                                    {lesson.sub}
                                                                </span>
                                                                <div className="flex items-center text-[10px] sm:text-[14px] text-slate-400 font-bold leading-none mt-0.5">
                                                                    <svg className="hidden sm:block w-3.5 h-3.5 mr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                                                    <span className="truncate">{lesson.r}</span>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <div className="bg-slate-50 p-3 sm:p-4 border-t border-slate-100 flex justify-center space-x-4 sm:space-x-8 text-[10px] sm:text-[13px] font-bold tracking-tight">
                                <div className="flex items-center text-slate-400 uppercase"><div className="w-2.5 h-2.5 rounded-full bg-white border border-slate-300 mr-1.5"></div> Common</div>
                                <div className="flex items-center text-indigo-500 uppercase"><div className="w-2.5 h-2.5 rounded-full bg-indigo-500 mr-1.5 shadow-sm shadow-indigo-200"></div> Elective</div>
                            </div>
                        </div>
                    )}
                    
                    <footer className="mt-8 text-center text-slate-400 text-[10px] sm:text-xs pb-4">
                        <p>© 2026 2학년 4반 시간표 도우미</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
